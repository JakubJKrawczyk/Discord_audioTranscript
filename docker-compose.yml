services:
  # ---------------------------------------------------------------------------
  # Whisper API (gpuworker) - transkrypcja audio (GPU) + endpoint /summarize/
  # Ollama NIE jest tu uruchamiana - używamy instancji na hoście
  # (OLLAMA_API_URL z pliku .env, domyślnie https://ollama.jakubkrawczyk.com).
  # ---------------------------------------------------------------------------
  whisper-api:
    build:
      context: ./gpuworker
      dockerfile: Dockerfile
    image: whisper-ollama-api:latest
    container_name: whisper-ollama-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      # Tylko compute+utility - bez bibliotek graficznych (EGL).
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - whisper-models:/models
    networks:
      - transcription-network
    # Wystaw port na loopbacku hosta, żeby bot (w sieci hosta) mógł go osiągnąć.
    # Host:18000 -> kontener:8000 (8000 na hoście bywa zajęte).
    ports:
      - "127.0.0.1:18000:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/')"]
      interval: 15s
      timeout: 10s
      retries: 20
      # Model Whisper "large" ładuje się długo - daj zapas czasu na start.
      start_period: 300s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ---------------------------------------------------------------------------
  # Bot Discord (CPU)
  # ---------------------------------------------------------------------------
  bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    image: discord-audio-bot:latest
    container_name: discord-audio-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # whisper-api jest wystawiony na loopbacku hosta (bot używa sieci hosta).
      - API_URL=http://127.0.0.1:18000
    volumes:
      # Audio (czyszczone po N dniach) i trwały magazyn transkrypcji/podsumowań.
      - ./recordings:/app/recordings
      - ./data:/app/data
    # Sieć hosta - wymagana do poprawnego ODBIORU głosu (UDP/RTP) z Discorda.
    # Bez tego dockerowy NAT gubi zwrotny strumień RTP i nagrania są ~puste.
    network_mode: host
    depends_on:
      whisper-api:
        condition: service_healthy

networks:
  transcription-network:
    driver: bridge

volumes:
  whisper-models:
    driver: local
